; ===============================
; Broadridge FIX over TLS Tunnel
; ===============================

; Run stunnel in client mode
client = yes
foreground = no
debug = 5
output = C:\My Apps\RJF.TradeAllocBridge\logs\stunnel.log

; ---- Certificates ----
; These should be valid client and CA files provided by Broadridge or your PKI.
CAfile = C:\My Apps\RJF.TradeAllocBridge\certs\broadridge_ca.pem
cert = C:\My Apps\RJF.TradeAllocBridge\certs\tradealloc_client.pem
key = C:\My Apps\RJF.TradeAllocBridge\certs\tradealloc_client.key
verify = 2        ; require server verification (1=basic, 2=strict)

; ---- Service Definition ----
[fxtls]
accept = 127.0.0.1:9876          ; local listener port (plain TCP for your app)
connect = fix.broadridge.com:9880 ; remote FIX TLS endpoint
TIMEOUTbusy = 30
TIMEOUTidle = 300
TIMEOUTclose = 60
